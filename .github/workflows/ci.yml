name: Openpot CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v4
      with:
        version: 10.10.0

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '24'
        cache: 'pnpm'

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Lint
      run: pnpm run lint

    - name: Run Unit Tests
      run: pnpm run test

    - name: Build
      run: pnpm run build

    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps

    - name: Run E2E Tests
      run: pnpm run e2e

  deploy:
    needs: build-and-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Check if already a version bump
        id: check_bump
        run: |
          if [[ $(git log -1 --pretty=%s) == chore:\ bump\ version* ]]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Latest commit is already a version bump. Proceeding to deploy."
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "Feature merge detected. Creating version bump PR."
          fi

      - name: Prepare version bump
        if: steps.check_bump.outputs.skip == 'false'
        id: prep
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          NEW_VERSION=$(npm version minor --no-git-tag-version)
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

      - name: Create Pull Request for version bump
        if: steps.check_bump.outputs.skip == 'false'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore: bump version to ${{ steps.prep.outputs.new_version }}"
          branch: "automated/version-bump"
          delete-branch: true
          title: "chore: bump version to ${{ steps.prep.outputs.new_version }}"
          body: "This is an automated version bump triggered by a merge to main. Please merge this to trigger the production deployment."
          base: main

      - name: Setup pnpm
        if: steps.check_bump.outputs.skip == 'true'
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Log in to the Container registry
        if: steps.check_bump.outputs.skip == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        if: steps.check_bump.outputs.skip == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/openpot
          tags: |
            type=sha
            type=raw,value=latest

      - name: Build and push Docker image
        if: steps.check_bump.outputs.skip == 'true'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_HASH=${{ github.sha }}

      - name: Install Koyeb CLI
        if: steps.check_bump.outputs.skip == 'true'
        run: curl https://raw.githubusercontent.com/koyeb/koyeb-cli/master/install.sh | sh

      - name: Redeploy Koyeb Service
        if: steps.check_bump.outputs.skip == 'true'
        run: |
          $HOME/.koyeb/bin/koyeb service redeploy openpot/openpot --token ${{ secrets.KOYEB_API_TOKEN }}

      - name: Extract version
        if: steps.check_bump.outputs.skip == 'true'
        id: get_version
        run: |
          VERSION=$(grep '"version":' package.json | head -1 | cut -d '"' -f 4)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        if: steps.check_bump.outputs.skip == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          name: Release ${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          token: ${{ secrets.GITHUB_TOKEN }}
