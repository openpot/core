name: 🚀 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup pnpm
      uses: pnpm/action-setup@v3
      with:
        version: 9

    - name: Use Node.js
      uses: actions/setup-node@v6
      with:
        node-version: '20'
        cache: 'pnpm'

    - name: Install Dependencies
      run: pnpm install --frozen-lockfile

    - name: Run Lint
      run: pnpm run lint

    - name: Run Unit Tests
      run: pnpm run test

    - name: Build
      run: pnpm run build

    - name: Install Playwright Browsers
      run: pnpm exec playwright install --with-deps

    - name: Run E2E Tests
      run: pnpm run e2e
